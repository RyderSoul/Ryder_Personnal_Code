  - 119.29.29.29
  - 223.5.5.5
  upstreams:
    苹果服务:
    - https://dns.alidns.com/dns-query
    - https://doh.360.cn
    - https://doh.pub/dns-query
    美团点评:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    拼多多拼:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    小小红书:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    阿里巴巴:
    - 223.5.5.5
    - https://dns.alidns.com/dns-query
    企鹅腾讯:
    - https://1.12.12.12/dns-query
    - https://doh.pub/dns-query
    - tls://dot.pub
    字节跳动:
    - 180.184.2.2
    - 180.184.1.1
    国内DNS:
    - https://doh.pub/dns-query
    - https://doh.360.cn
    - https://dns.alidns.com/dns-query
    国外DNS:
    - https://dns.google/dns-query
    - https://1.1.1.1/dns-query
  forward:
  - domain_regex:
      match: ^.*(meituan|dianping|mtyun|meituan|dpfile).*
      value: 美团点评
      disabled: false
  - domain_regex:
      match: ^.*(pinduoduo|yangkeduo|pddpic).*
      value: 拼多多拼
      disabled: false
  - domain_regex:
      match: ^.*(xiaohongshu|xhscdn|xiaohongshu).*
      value: 小小红书
      disabled: false
  - domain_regex:
      match: ^.*(alibaba|aliyun|taobao|tmall|alicdn|alipay|dingtalk|aliapp).*
      value: 阿里巴巴
      disabled: false
  - domain_regex:
      match: ^.*(tencent|qq|wechat|weixin|wx|qlogo).*
      value: 企鹅腾讯
      disabled: false
  - domain_regex:
      match: ^.*(bytedance|snssdk|douyin|toutiao|byteimg|zijieapi|zijie|doubao).*
      value: 字节跳动
      disabled: false
  - domain_regex:
      match: google|youtube|googlevideo|googleapis|ytimg|facebook|instagram|twitter|telegram|netflix|github|spotify|att|scdn|nist
      value: 国外DNS
      disabled: false
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Apple/Apple_All_No_Resolve.list
      value: 苹果服务
      disabled: false
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/ChinaMax/ChinaMax_All.list
      value: 国内DNS
      disabled: false
  - domain_wildcard:
      match: '*.cn'
      value: 国内DNS
      disabled: false
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.list
      value: 国内DNS
      disabled: false
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Proxy/Proxy_All_No_Resolve.list
      value: 国外DNS
      disabled: false
  - domain_wildcard:
      match: '*'
      value: 国外DNS
      disabled: false
  public_ip_lookup_url: https://ifconfig.me/ip
